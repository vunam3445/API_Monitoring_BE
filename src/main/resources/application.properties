spring.application.name=API Monitoring

//DB
# Thông tin k?t n?i Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/API_Monitoring
spring.datasource.username=postgres
spring.datasource.password=123456

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.web.pageable.serialization-mode=via-dto

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

google.client-id=${GOOGLE_CLIENT_ID}

# REDIS CONFIGURATION (Caching)
# ===============================
# M?c ??nh k?t n?i t?i Redis ch?y trên máy (Local) ho?c Docker
spring.data.redis.host=localhost
spring.data.redis.port=6379
# N?u Redis có m?t kh?u thì ?i?n vào ?ây, không thì ?? tr?ng
spring.data.redis.password=
# Ki?u Cache s? d?ng là Redis
spring.cache.type=redis
# Th?i gian s?ng m?c ??nh c?a Cache (ví d?: 10 phút)
spring.cache.redis.time-to-live=600000
# Cho phép l?u giá tr? null vào cache (tránh Cache Penetration)
spring.cache.redis.cache-null-values=true

# ===============================
# SECURITY CONFIGURATION
# ===============================
# T?t m?c ??nh c?a Spring Boot ?? t? c?u hình theo JWT
spring.main.allow-bean-definition-overriding=true


spring.aop.proxy-target-class=true

# CLOUDINARY CONFIGURATION
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# RABBITMQ CONFIGURATION
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.task.scheduling.pool.size=5

# ===============================
# VNPAY CONFIGURATION
# ===============================
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}

# ===============================
# MAIL CONFIGURATION (Brevo SMTP)
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${SMTP_BREVO_USERNAME}
spring.mail.password=${SMTP_BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
notification.from-email=nam0302200301@gmail.com

# ===============================
# PERFORMANCE OPTIMIZATION
# ===============================
# Tăng số kết nối tối đa xuống Database (HikariCP)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10

# Tăng số Workers xử lý RabbitMQ song song
spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=50
# Mỗi thread xử lý tối đa 5 message cùng lúc, tránh quá tải RAM
spring.rabbitmq.listener.simple.prefetch=5
